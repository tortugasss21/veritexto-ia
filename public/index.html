<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeriTexto IA - Detector de Desinformação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0066ff;
            --primary-dark: #0052cc;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --light: #f8fafc;
            --border: #e2e8f0;
            --text: #333333;
            --text-light: #666666;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #eef4ff 100%);
            color: var(--text);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--primary) 0%, #0052cc 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, #0052cc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.1em;
            color: var(--text-light);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
        }

        .tab-button {
            padding: 12px 24px;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1.05em;
            font-weight: 600;
            color: var(--text-light);
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }

        .tab-button:hover {
            color: var(--primary);
        }

        .tab-button.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text);
        }

        textarea {
            width: 100%;
            height: 160px;
            padding: 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1em;
            resize: vertical;
            transition: all 0.3s ease;
            background: var(--light);
        }

        textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 102, 255, 0.1);
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            width: 100%;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 102, 255, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: var(--light);
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .risk-badge {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            color: white;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .risk-low {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
        }

        .risk-medium {
            background: linear-gradient(135deg, var(--warning) 0%, #d97706 100%);
        }

        .risk-high {
            background: linear-gradient(135deg, var(--danger) 0%, #dc2626 100%);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid var(--danger);
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid var(--success);
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8em;
            }

            .card {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <div class="logo-icon">🔍</div>
                <h1>VeriTexto IA</h1>
            </div>
            <p class="subtitle">Detector de Possíveis Sinais de Desinformação</p>
        </div>

        <div class="tabs">
            <button class="tab-button active" onclick="mudarAba('analise')">📝 Análise</button>
            <button class="tab-button" onclick="mudarAba('historico')">📊 Histórico</button>
            <button class="tab-button" onclick="mudarAba('estatisticas')">📈 Estatísticas</button>
        </div>

        <div id="analise" class="tab-content active">
            <div class="card">
                <div class="form-group">
                    <label for="texto">Cole o texto a analisar:</label>
                    <textarea id="texto" placeholder="Cole aqui uma manchete, notícia ou post..."></textarea>
                </div>

                <button class="btn-primary" id="btnAnalisar" onclick="analisarTexto()">
                    <span id="btnText">Analisar texto</span>
                    <span id="spinner" style="display: none;" class="loading-spinner"></span>
                </button>
                <button class="btn-secondary" onclick="limparFormulario()">Limpar</button>

                <div class="error-message" id="errorMessage"></div>
                <div class="success-message" id="successMessage"></div>

                <div id="resultados" style="display: none; margin-top: 30px;">
                    <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 30px;">
                        <div class="risk-badge" id="riskBadge">
                            <span id="riskPercentage" style="font-size: 1.8em;">-</span>
                            <span style="font-size: 0.8em;">RISCO</span>
                        </div>
                        <div>
                            <h2 id="riskTitle">Analisando...</h2>
                            <p id="riskDescription">Aguarde...</p>
                        </div>
                    </div>

                    <div style="margin-top: 24px;">
                        <h3>🚨 Sinais Identificados</h3>
                        <div id="signalsContainer"></div>
                    </div>

                    <div style="margin-top: 24px; padding: 20px; background: rgba(0, 102, 255, 0.05); border-radius: 12px; border-left: 4px solid var(--primary);">
                        <h4 style="color: var(--primary);">📝 Análise Detalhada</h4>
                        <p id="explanation"></p>
                    </div>
                </div>
            </div>
        </div>

        <div id="historico" class="tab-content">
            <div class="card">
                <h2>Histórico de Análises</h2>
                <div id="historicoContainer">
                    <p>Carregando...</p>
                </div>
            </div>
        </div>

        <div id="estatisticas" class="tab-content">
            <div class="card">
                <h2>Estatísticas</h2>
                <div id="statsContainer">
                    <p>Carregando...</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api';

        function mudarAba(aba) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
            document.getElementById(aba).classList.add('active');
            event.target.classList.add('active');

            if (aba === 'historico') carregarHistorico();
            if (aba === 'estatisticas') carregarEstatisticas();
        }

        async function analisarTexto() {
            const texto = document.getElementById('texto').value.trim();
            const btnAnalisar = document.getElementById('btnAnalisar');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btnText');

            if (!texto || texto.length < 20) {
                mostrarErro('O texto deve ter pelo menos 20 caracteres.');
                return;
            }

            btnAnalisar.disabled = true;
            spinner.style.display = 'inline-block';
            btnText.style.display = 'none';

            try {
                const response = await fetch(`${API_URL}/analisar`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ texto })
                });

                if (!response.ok) {
                    const erro = await response.json();
                    throw new Error(erro.erro || 'Erro ao analisar');
                }

                const resultado = await response.json();
                mostrarResultados(resultado);
                mostrarSucesso('Análise concluída!');

            } catch (error) {
                mostrarErro(`Erro: ${error.message}`);
            } finally {
                btnAnalisar.disabled = false;
                spinner.style.display = 'none';
                btnText.style.display = 'inline';
            }
        }

        function mostrarResultados(resultado) {
            const riskBadge = document.getElementById('riskBadge');
            const riskTitle = document.getElementById('riskTitle');
            const riskDescription = document.getElementById('riskDescription');
            const riskPercentage = document.getElementById('riskPercentage');

            riskBadge.className = 'risk-badge';
            riskBadge.classList.add(`risk-${resultado.risco}`);

            riskPercentage.textContent = resultado.percentualRisco + '%';

            if (resultado.risco === 'baixo') {
                riskTitle.textContent = 'RISCO BAIXO';
                riskDescription.textContent = 'Poucos sinais de desinformação.';
            } else if (resultado.risco === 'médio') {
                riskTitle.textContent = 'RISCO MÉDIO';
                riskDescription.textContent = 'Contém alguns sinais. Verifique em fontes confiáveis.';
            } else {
                riskTitle.textContent = 'RISCO ALTO';
                riskDescription.textContent = 'Vários sinais de desinformação. Não compartilhe sem verificar.';
            }

            const signalsContainer = document.getElementById('signalsContainer');
            if (resultado.sinais && resultado.sinais.length > 0) {
                signalsContainer.innerHTML = resultado.sinais
                    .map(s => `<div style="margin: 8px 0; padding: 12px; background: var(--light); border-radius: 8px;">⚠️ ${s}</div>`)
                    .join('');
            }

            document.getElementById('explanation').textContent = resultado.explicacao;
            document.getElementById('resultados').style.display = 'block';
        }

        function limparFormulario() {
            document.getElementById('texto').value = '';
            document.getElementById('resultados').style.display = 'none';
            document.getElementById('texto').focus();
        }

        function mostrarErro(msg) {
            const errorMsg = document.getElementById('errorMessage');
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        function mostrarSucesso(msg) {
            const successMsg = document.getElementById('successMessage');
            successMsg.textContent = msg;
            successMsg.classList.add('show');
            setTimeout(() => successMsg.classList.remove('show'), 3000);
        }

        async function carregarHistorico() {
            try {
                const response = await fetch(`${API_URL}/analises`);
                if (!response.ok) throw new Error('Erro ao carregar');

                const analises = await response.json();
                const historicoContainer = document.getElementById('historicoContainer');

                if (analises.length === 0) {
                    historicoContainer.innerHTML = '<p>Nenhuma análise realizada ainda.</p>';
                    return;
                }

                historicoContainer.innerHTML = analises.map(a => `
                    <div style="margin: 12px 0; padding: 16px; background: var(--light); border-radius: 8px;">
                        <strong>${a.texto.substring(0, 80)}...</strong><br>
                        Risco: ${a.risco} (${a.percentualRisco}%)
                    </div>
                `).join('');

            } catch (error) {
                document.getElementById('historicoContainer').innerHTML = '<p style="color: var(--danger);">Erro ao carregar.</p>';
            }
        }

        async function carregarEstatisticas() {
            try {
                const response = await fetch(`${API_URL}/estatisticas`);
                if (!response.ok) throw new Error('Erro ao carregar');

                const stats = await response.json();
                document.getElementById('statsContainer').innerHTML = `
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
                        <div style="padding: 20px; background: var(--light); border-radius: 12px; text-align: center;">
                            <div style="font-size: 2em; font-weight: bold; color: var(--primary);">${stats.totalAnalises}</div>
                            <div>Total de Análises</div>
                        </div>
                        <div style="padding: 20px; background: var(--light); border-radius: 12px; text-align: center;">
                            <div style="font-size: 2em; font-weight: bold; color: var(--success);">${stats.taxaAcerto}%</div>
                            <div>Taxa de Acerto</div>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('statsContainer').innerHTML = '<p style="color: var(--danger);">Erro ao carregar.</p>';
            }
        }
    </script>
</body>
</html>
