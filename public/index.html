<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VeriTexto IA</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --primary:#0066ff;
  --success:#10b981;
  --warning:#f59e0b;
  --danger:#ef4444;
  --light:#f8fafc;
  --border:#e2e8f0;
}

body {
  font-family: Arial;
  background: linear-gradient(135deg,#f8fafc,#eef4ff);
}

.container {
  max-width:900px;
  margin:auto;
  padding:20px;
}

h1 {
  text-align:center;
  margin-bottom:10px;
  color:var(--primary);
}

.subtitle {
  text-align:center;
  margin-bottom:30px;
  color:#666;
}

.card {
  background:white;
  padding:25px;
  border-radius:12px;
  box-shadow:0 4px 20px rgba(0,0,0,0.08);
}

textarea {
  width:100%;
  height:140px;
  padding:10px;
  border:2px solid var(--border);
  border-radius:10px;
}

button {
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}

.btn-primary {
  width:100%;
  background:var(--primary);
  color:white;
  margin-top:10px;
}

.btn-secondary {
  margin-top:10px;
}

.risk-badge {
  width:100px;
  height:100px;
  border-radius:50%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  color:white;
  font-weight:bold;
}

.risk-low { background:var(--success); }
.risk-medium { background:var(--warning); }
.risk-high { background:var(--danger); }

.stat-box {
  background:var(--light);
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.error { color:red; margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<h1>VeriTexto IA</h1>
<p class="subtitle">Detector de Desinformação</p>

<div class="card">

<textarea id="texto" placeholder="Cole um texto..."></textarea>

<button class="btn-primary" onclick="analisarTexto()">Analisar</button>
<button class="btn-secondary" onclick="limpar()">Limpar</button>

<p id="erro" class="error"></p>

<div id="resultado" style="display:none; margin-top:20px;">

<div style="display:flex; gap:20px; align-items:center;">
  <div id="badge" class="risk-badge"></div>
  <div>
    <h2 id="titulo"></h2>
    <p id="desc"></p>
  </div>
</div>

<h3 style="margin-top:20px;">Sinais</h3>
<div id="sinais"></div>

<h3 style="margin-top:20px;">Explicação</h3>
<p id="explicacao"></p>

<h3 style="margin-top:20px;">Recomendação</h3>
<p id="recomendacao"></p>

</div>

</div>

<div class="card" style="margin-top:20px;">

<h2>Estatísticas</h2>

<div id="stats" style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px;">
</div>

</div>

</div>

<script>

const API = window.location.origin + "/api";

function limpar(){
  document.getElementById("texto").value="";
  document.getElementById("resultado").style.display="none";
}

function normalizar(r){
  r = (r||"").toLowerCase();

  if(r.includes("alto")) return "high";
  if(r.includes("medio") || r.includes("médio")) return "medium";
  return "low";
}

async function analisarTexto(){
  const texto = document.getElementById("texto").value;

  try{
    const res = await fetch(API+"/analisar",{
      method:"POST",
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({texto})
    });

    const data = await res.json();

    mostrar(data);

  }catch(e){
    document.getElementById("erro").innerText = e.message;
  }
}

function mostrar(d){

  const risco = normalizar(d.risco);

  const badge = document.getElementById("badge");
  badge.className = "risk-badge";

  if(risco==="high") badge.classList.add("risk-high");
  if(risco==="medium") badge.classList.add("risk-medium");
  if(risco==="low") badge.classList.add("risk-low");

  badge.innerHTML = `<div>${d.percentualRisco || 50}%</div>`;

  document.getElementById("titulo").innerText = "RISCO " + risco.toUpperCase();
  document.getElementById("desc").innerText = "Análise automática";

  document.getElementById("explicacao").innerText = d.explicacao;
  document.getElementById("recomendacao").innerText = d.recomendacao;

  document.getElementById("sinais").innerHTML =
    (d.sinais || []).map(s=>`<p>⚠️ ${s}</p>`).join("");

  document.getElementById("resultado").style.display="block";

  carregarStats();
}

async function carregarStats(){

  const res = await fetch(API+"/estatisticas");
  const s = await res.json();

  const riscos = {baixo:0, medio:0, alto:0};

  (s.porRisco||[]).forEach(r=>{
    riscos[r._id] = r.quantidade;
  });

  document.getElementById("stats").innerHTML = `
    <div class="stat-box">Total<br><b>${s.totalAnalises}</b></div>
    <div class="stat-box">Baixo<br><b>${riscos.baixo||0}</b></div>
    <div class="stat-box">Médio<br><b>${riscos.medio||0}</b></div>
    <div class="stat-box">Alto<br><b>${riscos.alto||0}</b></div>
  `;
}

carregarStats();

</script>

</body>
</html>
